map $http_upgrade $zzv2_sub2api_connection_upgrade {
    default upgrade;
    '' close;
}

upstream zzv2_sub2api {
    server 127.0.0.1:18080;
    keepalive 32;
}

server {
    listen 80;
    server_name 111.228.39.25;

    client_max_body_size 256m;

    access_log /var/log/nginx/zzv2-sub2api.access.log;
    error_log /var/log/nginx/zzv2-sub2api.error.log;

    location = /zz {
        proxy_pass http://zzv2_sub2api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Prefix /zz;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $zzv2_sub2api_connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    location /zz/ {
        proxy_pass http://zzv2_sub2api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Prefix /zz;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $zzv2_sub2api_connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    location / {
        proxy_pass http://zzv2_sub2api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $zzv2_sub2api_connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }
}
