name: Deploy zzv2

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-zzv2
  cancel-in-progress: true

env:
  DEPLOY_HOST: ${{ secrets.SERVER_HOST }}
  DEPLOY_USER: ${{ secrets.SERVERUSER }}
  DEPLOY_PORT: ${{ secrets.SERVER_PORT }}
  DEPLOY_DIR: /work/project/zzv2

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set image tag
        id: meta
        shell: bash
        run: |
          short_sha="${GITHUB_SHA::12}"
          image_repo="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "image=${image_repo}" >> "$GITHUB_OUTPUT"
          echo "image_tag=sha-${short_sha}" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.image }}:zzv2-latest
          build-args: |
            VERSION=zzv2-${{ steps.meta.outputs.image_tag }}
            COMMIT=${{ github.sha }}
            DATE=${{ steps.meta.outputs.build_date }}
            GOPROXY=https://goproxy.cn,direct
            GOSUMDB=sum.golang.google.cn
            PNPM_VERSION=9.15.9
            NPM_CONFIG_REGISTRY=https://registry.npmmirror.com

      - name: Prepare SSH
        shell: bash
        env:
          DEPLOY_SSH_KEY: ${{ secrets.ZZV2_DEPLOY_SSH_KEY }}
        run: |
          test -n "${DEPLOY_SSH_KEY}" || { echo "Missing secret ZZV2_DEPLOY_SSH_KEY"; exit 1; }
          test -n "${DEPLOY_HOST}" || { echo "Missing secret SERVER_HOST"; exit 1; }
          test -n "${DEPLOY_USER}" || { echo "Missing secret SERVERUSER"; exit 1; }
          test -n "${DEPLOY_PORT}" || { echo "Missing secret SERVER_PORT"; exit 1; }
          mkdir -p ~/.ssh
          printf '%s\n' "${DEPLOY_SSH_KEY}" > ~/.ssh/zzv2_deploy_key
          chmod 600 ~/.ssh/zzv2_deploy_key
          ssh-keyscan -p "${DEPLOY_PORT}" "${DEPLOY_HOST}" >> ~/.ssh/known_hosts

      - name: Sync deployment files
        shell: bash
        run: |
          ssh -i ~/.ssh/zzv2_deploy_key -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "mkdir -p '${DEPLOY_DIR}/nginx' '${DEPLOY_DIR}/releases'"
          scp -i ~/.ssh/zzv2_deploy_key -P "${DEPLOY_PORT}" \
            deploy/zzv2/docker-compose.yml \
            deploy/zzv2/.env.example \
            deploy/zzv2/remote-deploy.sh \
            "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_DIR}/"
          scp -i ~/.ssh/zzv2_deploy_key -P "${DEPLOY_PORT}" \
            deploy/zzv2/nginx/sub2api-zzv2.conf \
            "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_DIR}/nginx/sub2api-zzv2.conf"

      - name: Deploy on server
        shell: bash
        run: |
          ssh -i ~/.ssh/zzv2_deploy_key -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "cd '${DEPLOY_DIR}' && chmod +x remote-deploy.sh && DEPLOY_DIR='${DEPLOY_DIR}' APP_IMAGE='${{ steps.meta.outputs.image }}' IMAGE_TAG='${{ steps.meta.outputs.image_tag }}' GHCR_USERNAME='${{ github.actor }}' GHCR_TOKEN='${{ secrets.GITHUB_TOKEN }}' ./remote-deploy.sh"
